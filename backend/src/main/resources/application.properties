spring.application.name=BookDownload

spring.datasource.url=jdbc:mysql://localhost:3306/ebook_site?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

logging.level.com.jiang.dao=debug

# ===== Cloudinary 配置（新增）=====
cloudinary.cloud_name=你的cloud_name
cloudinary.api_key=你的api_key
cloudinary.api_secret=你的api_secret

# =====跨域配置=====
spring.mvc.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE
spring.mvc.cors.allow-credentials=true