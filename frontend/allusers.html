<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div id="app">

        <!-- ===== 导航栏 ===== -->
        <nav class="navbar navbar-expand-lg navbar-custom px-4">
            <h2 class="mb-0 mr-4">👨‍👨‍👧‍👦| 用户管理</h2>

            <button class="btn btn-light" @click="goHome">⬅返回首页</button>

            <!-- 导航菜单 -->
            <ul class="navbar-nav ml-auto">
                <li v-if="loggedIn" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        {{ user.email }}
                    </a>

                    <div class="dropdown-menu dropdown-menu-right">

                        <a v-if="user.is_admin == 1" class="dropdown-item" href="admin.html">管理员页面</a>

                        <a class="dropdown-item" href="mypage.html">个人主页</a>
                        <a class="dropdown-item" href="upload.html">上传图书</a>

                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="#" @click.prevent="logout">退出登录</a>
                    </div>
                </li>

                <li v-else class="nav-item">
                    <a class="nav-link" href="#" @click.prevent="goLogin">登录</a>
                </li>
            </ul>
        </nav>

        <!-- ===== 内容 ===== -->
        <div class="container mt-5">

            <h4>管理员：{{ user.email }}</h4>

            <table class="table table-bordered mt-3">
                <thead>
                    <tr>
                        <th>用户</th>
                        <th>权限</th>
                        <th>操作</th>
                        <th>删除</th>
                    </tr>
                </thead>

                <tbody>
                    <tr v-for="u in users" :key="u.id">

                        <td>{{ u.email }}</td>

                        <td>
                            <span v-if="u.is_admin == 1" style="color:blue;">管理员</span>
                            <span v-else>普通用户</span>
                        </td>

                        <td>
                            <button class="btn btn-warning btn-sm" @click="setAdmin(u)">
                                {{ u.is_admin == 1 ? "取消管理员" : "设为管理员" }}
                            </button>
                        </td>

                        <td>
                            <button class="btn btn-danger btn-sm" @click="deleteUser(u.email)">
                                删除
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Vue -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        axios.defaults.withCredentials = true

        new Vue({
            el: "#app",

            data: {
                loggedIn: false,
                user: {},
                users: []
            },

            mounted() {
                this.loadNav()
                this.loadMyInfo()
                this.loadUsers()
            },

            methods: {

                // ===== 返回首页 =====
                goHome() {
                    window.location.href = "index.html"
                },

                // ===== 加载导航栏 =====
                loadNav() {
                    axios.post('https://bookdownload-java.onrender.com/index/nav')
                        .then(res => {
                            let data = res.data

                            this.loggedIn = data.loggedIn
                            this.user = data
                        })
                        .catch(() => {
                            alert("加载导航失败")
                        })
                },

                // ===== 当前管理员信息 =====
                loadMyInfo() {
                    axios.get('https://bookdownload-java.onrender.com/user/mypage')
                        .then(res => {
                            if (res.data.code === 1) {
                                // this.user = res.data.data
                            } else {
                                alert("请先登录")
                                window.location.href = "login.html"
                            }
                        })
                        .catch(() => {
                            alert("加载个人信息失败")
                        })
                },

                // ===== 所有用户 =====
                loadUsers() {
                    axios.get('https://bookdownload-java.onrender.com/admin/users')
                        .then(res => {
                            if (res.data.code === 1) {
                                this.users = res.data.data
                            }
                        })
                        .catch(() => {
                            alert("加载用户失败")
                        })
                },

                // ===== 设置管理员 =====
                setAdmin(u) {
                    let msg = u.is_admin == 1 ? "取消管理员？" : "设为管理员？"

                    if (!confirm(msg)) return

                    axios.post('https://bookdownload-java.onrender.com/admin/setAdmin', {
                        id: u.id
                    })
                        .then(res => {
                            alert(res.data.msg)
                            if (res.data.code === 1) {
                                this.loadUsers()
                            }
                        })
                },

                // ===== 删除用户 =====
                deleteUser(email) {
                    if (!confirm("确定删除？")) return

                    axios.post('https://bookdownload-java.onrender.com/admin/deleteUser', {
                        email: email
                    })
                        .then(res => {
                            alert(res.data.msg)
                            if (res.data.code === 1) {
                                this.loadUsers()
                            }
                        })
                },

                // ===== 退出登录 =====
                logout() {
                    axios.post('https://bookdownload-java.onrender.com/user/logout')
                        .then(res => {
                            if (res.data.success) {
                                window.location.href = "index.html"
                            }
                        })
                },

                goLogin() {
                    window.location.href = "login.html"
                }
            }
        })
    </script>

</body>

</html>
