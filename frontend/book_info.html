<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>书籍详情</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/book_info.css">
</head>

<body>
    <div id="app">

        <!-- ===== 导航栏 ===== -->
        <nav class="navbar navbar-expand-lg navbar-custom px-4">
            <h2 class="mb-0 mr-4">📚| 电子书下载网站</h2>

            <button class="btn btn-light" @click="goHome">⬅返回首页</button>

            <!-- 导航菜单 -->
            <ul class="navbar-nav ml-auto">
                <li v-if="loggedIn" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        {{ user.email }}
                    </a>
            
                    <div class="dropdown-menu dropdown-menu-right">
            
                        <a v-if="user.is_admin == 1" class="dropdown-item" href="admin.html">管理员页面</a>
            
                        <a class="dropdown-item" href="mypage.html">个人主页</a>
                        <a class="dropdown-item" href="upload.html">上传图书</a>
            
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="#" @click.prevent="logout">退出登录</a>
                    </div>
                </li>
            
                <li v-else class="nav-item">
                    <a class="nav-link" href="#" @click.prevent="goLogin">登录</a>
                </li>
            </ul>
        </nav>

        <!-- ===== 书籍信息 ===== -->
        <h3 id="book-title">《{{ book.title }}》</h3>

        <div class="book-detail">
            <img :src="book.pic" style="width:200px">

            <div class="download-btn">
                <button class="btn btn-success btn-lg" @click="download">
                    📥 下载
                </button>
            </div>
        </div>

    </div>

    <!-- Vue -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        axios.defaults.withCredentials = true

        new Vue({
            el: '#app',

            data: {
                loggedIn: false,
                user: {},
                book: {},
                bookId: null
            },

            mounted() {
                this.bookId = this.getBookId()
                this.loadNav()
                this.loadBook()
            },

            methods: {

                // ===== 获取URL参数 =====
                getBookId() {
                    const params = new URLSearchParams(window.location.search)
                    return params.get("id")
                },

                // ===== 加载导航栏 =====
                loadNav() {
                    axios.post('http://localhost:8080/index/nav')
                        .then(res => {
                            this.loggedIn = res.data.loggedIn
                            this.user = res.data
                        })
                },

                // ===== 加载书籍 =====
                loadBook() {
                    if (!this.bookId) {
                        alert("缺少ID")
                        return
                    }

                    axios.post('http://localhost:8080/book/book_info', {
                        id: this.bookId
                    })
                        .then(res => {
                            this.book = res.data.book
                        })
                },

                // ===== 下载 =====
                download() {
                    if (!this.loggedIn) {
                        alert("请先登录")
                        return
                    }

                    window.location.href =
                        "http://localhost:8080/book/download?id=" + this.bookId
                },

                // ===== 退出 =====
                logout() {
                    axios.post('http://localhost:8080/user/logout')
                        .then(() => {
                            this.loadNav()
                        })
                },

                goHome() {
                    window.location.href = "index.html"
                },

                goLogin() {
                    window.location.href = "login.html"
                }
            }
        })
    </script>

</body>

</html>
