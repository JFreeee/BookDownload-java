<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>上传图书</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/upload.css">
</head>

<body>
    <div id="app">
        <!-- ===== 导航栏 ===== -->
        <nav class="navbar navbar-expand-lg navbar-custom px-4">
            <h2 class="mb-0 mr-4">📚| 电子书下载网站</h2>

            <button class="btn btn-light" @click="goHome">⬅返回首页</button>

            <!-- 导航菜单 -->
            <ul class="navbar-nav ml-auto">
                <li v-if="loggedIn" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        {{ user.email }}
                    </a>

                    <div class="dropdown-menu dropdown-menu-right">

                        <a v-if="user.is_admin == 1" class="dropdown-item" href="admin.html">管理员页面</a>

                        <a class="dropdown-item" href="mypage.html">个人主页</a>

                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="#" @click.prevent="logout">退出登录</a>
                    </div>
                </li>

                <li v-else class="nav-item">
                    <a class="nav-link" href="#" @click.prevent="goLogin">登录</a>
                </li>
            </ul>
        </nav>

        <!-- ===== 上传功能 =====-->
        <div class="container mt-5">
            <div class="form-group">
                <h4>图书标题</h4>
                <input type="text" id="title" class="form-control" v-model="title" required>
            </div>
            <br>
            <div class="form-group">
                <h4>封面图片 (不得大于10M)</h4>
                <input type="file" id="pic" accept="image/*" @change="handlePic" class="form-control-file" required>
            </div>

            <br>

            <div class="form-group">
                <h4>图书文件 (pdf 或 epub, 文件不得大于10M)</h4>
                <input type="file" id="bookfile" accept=".pdf,.epub" @change="handleBook" class="form-control-file"
                    required>
            </div>

            <br>

            <button id="uploadBtn" class="btn btn-primary" type="button" @click="upload">
                {{ uploading ? "正在上传..." : "上传" }}
            </button>
            <br>
            <div v-html="result"></div>
            <div id="result" class="mt-3"></div>
        </div>
    </div>

    <!-- Vue -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        axios.defaults.withCredentials = true
        window.onload = function () {
            new Vue({
                el: "#app",

                data: {
                    loggedIn: false,
                    user: {},

                    title: '',
                    pic: null,
                    bookfile: null,

                    uploading: false,
                    result: ''
                },

                mounted() {
                    // console.log("Vue 已挂载");
                    this.loadNav()
                },

                methods: {

                    // ===== 加载导航栏 =====
                    loadNav() {
                        axios.post('https://bookdownload-java.onrender.com/index/nav')
                            .then(res => {
                                this.loggedIn = res.data.loggedIn
                                this.user = res.data
                            })
                    },

                    // ===== 返回首页 =====
                    goHome() {
                        window.location.href = "index.html"
                    },

                    // ===== 选择图片 =====
                    handlePic(e) {
                        this.pic = e.target.files[0]
                    },

                    // ===== 选择书籍 =====
                    handleBook(e) {
                        this.bookfile = e.target.files[0]
                    },

                    // ===== 校验文件名 =====
                    isValidName(name) {
                        return /^[\w\-]+$/.test(name)
                    },

                    // ===== 上传 =====
                    upload() {

                        if (!this.title || !this.pic || !this.bookfile) {
                            this.result = `<div class="alert alert-warning">请填写完整信息</div>`
                            return
                        }

                        let picName = this.pic.name.split(".")[0]
                        let bookName = this.bookfile.name.split(".")[0]

                        // if (!this.isValidName(this.title) ||
                        //     !this.isValidName(picName) ||
                        //     !this.isValidName(bookName)) {

                        //     this.result = `<div class="alert alert-danger">不能有空格或特殊字符</div>`
                        //     return
                        // }

                        if (this.title !== picName || this.title !== bookName) {
                            this.result = `<div class="alert alert-danger">名称必须一致</div>`
                            return
                        }

                        let formData = new FormData()
                        formData.append("title", this.title)
                        formData.append("pic", this.pic)
                        formData.append("bookfile", this.bookfile)

                        this.uploading = true

                        axios.post('https://bookdownload-java.onrender.com/book/upload', formData)
                            .then(res => {
                                if (res.data.code === 1) {
                                    alert("上传成功")

                                    this.result = `<div class="alert alert-success">${res.data.msg}</div>`

                                    // 清空表单
                                    this.title = ''
                                    this.pic = null
                                    this.bookfile = null
                                } else {
                                    alert(res.data.msg)
                                    this.result = `<div class="alert alert-danger">${res.data.msg}</div>`
                                }
                            })
                            .catch(() => {
                                this.result = `<div class="alert alert-danger">上传失败</div>`
                            })
                            .finally(() => {
                                this.uploading = false
                            })

                    },

                    // ===== 退出登录 =====
                    logout() {
                        axios.post('https://bookdownload-java.onrender.com/user/logout')
                            .then(res => {
                                if (res.data.success) {
                                    this.loadNav()
                                }
                            })
                    },

                    //去登陆界面
                    goLogin() {
                        window.location.href = "login.html"
                    }
                }

            })

        }
    </script>
</body>

</html>
