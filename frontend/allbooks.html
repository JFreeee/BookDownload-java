<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div id="app">

        <!-- ===== 导航栏 ===== -->
        <nav class="navbar navbar-expand-lg navbar-custom px-4">
            <h2 class="mb-0 mr-4">👨‍👨‍👧‍👦| 用户管理</h2>

            <button class="btn btn-light" @click="goHome">⬅返回首页</button>

            <!-- 导航菜单 -->
            <ul class="navbar-nav ml-auto">
                <li v-if="loggedIn" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        {{ user.email }}
                    </a>

                    <div class="dropdown-menu dropdown-menu-right">

                        <a v-if="user.is_admin == 1" class="dropdown-item" href="admin.html">管理员页面</a>

                        <a class="dropdown-item" href="mypage.html">个人主页</a>
                        <a class="dropdown-item" href="upload.html">上传图书</a>

                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="#" @click.prevent="logout">退出登录</a>
                    </div>
                </li>

                <li v-else class="nav-item">
                    <a class="nav-link" href="#" @click.prevent="goLogin">登录</a>
                </li>
            </ul>
        </nav>

        <!-- ===== 内容 ===== -->
        <div class="container mt-5">

            <h4>
                管理员：{{ user.email }}
            </h4>

            <table class="table table-bordered mt-3">
                <thead>
                    <tr>
                        <th>封面</th>
                        <th>书名</th>
                        <th>上传人</th>
                        <th>上传日期</th>
                        <th>删除</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="b in books" :key="b.id">

                        <td>
                            <img :src="b.pic" style="width: 80px;">
                        </td>

                        <td>《{{ b.title}}》</td>

                        <td>{{ b.email}}</td>

                        <td>{{ formatTime(b.upload_time)}}</td>

                        <td>
                            <button class="btn btn-danger btn-sm" @click="deleteBook(b.id)">
                                删除
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>


    <!-- Vue -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>


    <script>
        axios.defaults.withCredentials = true
        new Vue({

            el: "#app",

            data: {
                loggedIn: false,
                user: {},
                books: []
            },

            mounted() {
                console.log("Vue启动了")
                this.loadNav()
                this.loadBooks()
            },

            methods: {


                // ===== 返回首页 =====
                goHome() {
                    window.location.href = "index.html"
                },

                // ===== 加载导航栏 =====
                loadNav() {
                    axios.post('http://localhost:8080/index/nav')
                        .then(res => {
                            let data = res.data
                            this.loggedIn = data.loggedIn
                            this.user = data
                        })
                        .catch(() => {
                            alert("加载导航失败")
                        })
                },

                // ===== 所有图书=====
                loadBooks() {
                    axios.post('http://localhost:8080/book/allbooks')
                        .then(res => {
                            console.log(res.data)

                            if (res.data.code === 1) {
                                this.books = res.data.data
                            } else {
                                alert(res.data.msg)
                            }
                        })
                        .catch(() => {
                            alert("加载图书失败")
                        })
                },

                //=======删除图书=======
                deleteBook(id) {
                    if (!confirm("确定删除吗？")) return

                    axios.post('http://localhost:8080/book/delete', { id: id })
                        .then(res => {
                            alert(res.data.msg)

                            if (res.data.code === 1) {
                                this.books = this.books.filter(b => b.id !== id)
                            }
                        })
                        .catch(() => {
                            alert("删除失败")
                        })
                },

                //=======退出登录=======
                logout() {
                    axios.post('http://localhost:8080/user/logout')
                        .then(res => {
                            if (res.data.success) {
                                window.location.href = "index.html"
                            }
                        })
                },

                //=======登录=======
                goLogin() {
                    window.location.href = "login.html"
                },

                
                //时间转换
                formatTime(time) {
                    return new Date(time).toLocaleString()
                }
            }
        })
    </script>
</body>

</html>
