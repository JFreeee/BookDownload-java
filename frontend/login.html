<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>那抓的图书馆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-custom px-4">
            <h2 class="mb-0 mr-4">📚| 电子书下载网站</h2>
        </nav>

        <div class="box0">
            <h2>👨🏻‍🎓 会员登录</h2>
            <div class="form-group">
                <label for="email">用户名:</label>
                <span id="res_email">{{ emailMsg }}</span>
                <input type="email" name="email" v-model="email" class="form-control" id="email" placeholder="请输入邮箱地址">
            </div>

            <div class="form-group">
                <label for="password">密码:</label>
                <span id="res_password">{{ passwordMsg }}</span>
                <input type="password" name="password" v-model="password" class="form-control" id="password"
                    placeholder="请输入密码">
            </div>

            <div class="d-flex justify-content-between">
                <a href="signup.html" class="btn btn-secondary">注册</a>
                <div class="text-right">
                    <button type="submit" class="btn btn-primary" @click="login">登录</button>
                    <small><a href="index.html">不登录</a></small>
                </div>
            </div>
        </div>
    </div>

    <!-- Vue -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        
        new Vue({
            el: '#app',

            data: {
                email: '',
                password: '',
                emailMsg: '',
                passwordMsg: ''
            },

            methods: {

                login() {

                    // 清空提示
                    this.emailMsg = ''
                    this.passwordMsg = ''

                    // // 简单校验
                    // if (!this.email) {
                    //     this.emailMsg = "请输入邮箱"
                    //     return
                    // }

                    // if (!this.password) {
                    //     this.passwordMsg = "请输入密码"
                    //     return
                    // }

                    // 请求后端
                    axios.post('https://bookdownload-java.onrender.com/user/login', {
                        email: this.email,
                        password: this.password
                    }, {
                        withCredentials: true
                    })
                        .then(res => {
                            console.log(res.data)
                            if (res.data.code === 200) {

                                // 登录成功
                                window.location.href = "index.html"

                            } else {

                                this.passwordMsg = "邮箱或密码错误"
                            }

                        })
                        .catch(err => {
                            console.error(err)
                            alert("请求失败（后端未启动或跨域问题）")
                        })
                }
            }
        })
    </script>

</body>

</html>
